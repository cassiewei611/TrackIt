version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: trackit-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "TrackIt_Pass123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P TrackIt_Pass123! -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trackit-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TrackItDb;User Id=sa;Password=TrackIt_Pass123!;TrustServerCertificate=True;"
      Jwt__SecretKey: "TrackIt-Super-Secret-Key-Min-32-Chars-Here!"
      Jwt__Issuer: "TrackItAPI"
      Jwt__Audience: "TrackItClient"
      FrontendUrl: "http://localhost:3000"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trackit-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlserver_data:
